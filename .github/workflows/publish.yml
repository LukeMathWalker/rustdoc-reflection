name: Publish crates to crates.io

permissions:
  contents: write
  # Required by `rust-lang/crates-io-auth-action` for OIDC trusted publishing.
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: release-plz release
    runs-on: ubuntu-latest
    # Only run on the merge commit that release-plz produces.
    if: ${{ startsWith(github.event.head_commit.message, 'chore: release') }}
    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Set git identity
        run: |
          git config --global user.name "rustdoc-reflection-releaser[bot]"
          git config --global user.email "ci@rustdoc-reflection"
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
          project_manifest: Cargo.toml
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
